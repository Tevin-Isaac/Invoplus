<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" style="background:transparent">
  <defs>
    <linearGradient id="phoneBg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1730"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </linearGradient>
    <linearGradient id="violetBtn2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D4AFF"/>
      <stop offset="100%" stop-color="#8B6AFF"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6D4AFF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Phone frame -->
  <rect x="30" y="10" width="340" height="680" rx="40" fill="#1A1A1F" filter="url(#shadow2)"/>
  <rect x="36" y="16" width="328" height="668" rx="36" fill="url(#phoneBg2)"/>

  <!-- Notch -->
  <rect x="140" y="22" width="120" height="28" rx="14" fill="#111114"/>

  <!-- Status bar -->
  <text x="60" y="42" font-family="sans-serif" font-size="11" fill="white" font-weight="600">9:41</text>
  <rect x="310" y="33" width="28" height="13" rx="3" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="312" y="35" width="20" height="9" rx="2" fill="#22C55E"/>

  <!-- Notification banner at top -->
  <rect x="46" y="60" width="308" height="64" rx="14" fill="#1A1730" stroke="#6D4AFF" stroke-width="1"/>
  <circle cx="72" cy="86" r="14" fill="#6D4AFF"/>
  <text x="72" y="91" font-family="sans-serif" font-size="14" text-anchor="middle">🔔</text>
  <text x="96" y="78" font-family="sans-serif" font-size="11" font-weight="700" fill="white">Bid Received!</text>
  <text x="96" y="92" font-family="sans-serif" font-size="10" fill="#9898A6">INV-2026-0042 · 4 sealed bids</text>
  <text x="96" y="106" font-family="sans-serif" font-size="10" fill="#6D4AFF">Auction ends in 14h 32m</text>

  <!-- Page title -->
  <text x="60" y="158" font-family="sans-serif" font-size="18" font-weight="700" fill="white">My Auctions</text>

  <!-- Auction card -->
  <rect x="46" y="172" width="308" height="180" rx="16" fill="#16161A" stroke="#6D4AFF" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="62" y="188" width="40" height="22" rx="6" fill="#22C55E" fill-opacity="0.2"/>
  <text x="82" y="203" font-family="sans-serif" font-size="11" fill="#22C55E" text-anchor="middle" font-weight="700">A</text>
  <text x="114" y="203" font-family="sans-serif" font-size="12" font-weight="700" fill="white">INV-2026-0042</text>
  <text x="62" y="228" font-family="sans-serif" font-size="11" fill="#9898A6">GlobalTech Solutions Ltd · Net 90</text>

  <line x1="62" y1="240" x2="338" y2="240" stroke="#252530" stroke-width="0.5"/>

  <text x="62" y="262" font-family="sans-serif" font-size="10" fill="#9898A6">Face Amount</text>
  <text x="62" y="278" font-family="sans-serif" font-size="18" font-weight="700" fill="white">$125,000</text>

  <text x="200" y="262" font-family="sans-serif" font-size="10" fill="#9898A6">AI Score</text>
  <text x="200" y="278" font-family="sans-serif" font-size="18" font-weight="700" fill="#6D4AFF">87/100</text>

  <!-- Sealed bids indicator -->
  <rect x="62" y="292" width="272" height="36" rx="8" fill="#111114" stroke="#252530" stroke-width="1"/>
  <text x="82" y="314" font-family="sans-serif" font-size="12" fill="white">🔒  4 Sealed Bids</text>
  <text x="298" y="314" font-family="sans-serif" font-size="10" fill="#9898A6" text-anchor="end">bids are private</text>

  <!-- Countdown -->
  <text x="62" y="342" font-family="sans-serif" font-size="11" fill="#9898A6">Auction closes in</text>
  <text x="62" y="360" font-family="sans-serif" font-size="22" font-weight="700" fill="#6D4AFF">14:32:07</text>

  <!-- Estimated payout -->
  <rect x="46" y="368" width="308" height="80" rx="16" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="66" y="392" font-family="sans-serif" font-size="11" fill="#9898A6">Estimated Payout Range</text>
  <text x="66" y="414" font-family="sans-serif" font-size="22" font-weight="700" fill="white">$102,500 – $112,500</text>
  <text x="66" y="434" font-family="sans-serif" font-size="10" fill="#9898A6">82–90% advance rate · Canton atomic settlement</text>

  <!-- Activity feed -->
  <text x="60" y="472" font-family="sans-serif" font-size="13" font-weight="600" fill="white">Activity</text>

  <!-- Activity items -->
  <circle cx="68" cy="496" r="5" fill="#6D4AFF"/>
  <text x="82" y="500" font-family="sans-serif" font-size="11" fill="white">Sealed bid received</text>
  <text x="82" y="512" font-family="sans-serif" font-size="9" fill="#9898A6">2 minutes ago · Canton party anonymous</text>

  <circle cx="68" cy="530" r="5" fill="#6D4AFF" fill-opacity="0.5"/>
  <text x="82" y="534" font-family="sans-serif" font-size="11" fill="white">Sealed bid received</text>
  <text x="82" y="546" font-family="sans-serif" font-size="9" fill="#9898A6">28 minutes ago · Canton party anonymous</text>

  <circle cx="68" cy="564" r="5" fill="#22C55E"/>
  <text x="82" y="568" font-family="sans-serif" font-size="11" fill="white">Invoice verified by AI</text>
  <text x="82" y="580" font-family="sans-serif" font-size="9" fill="#9898A6">2 hours ago · Score: 87 · Grade: A</text>

  <!-- Canton proof bar -->
  <rect x="46" y="606" width="308" height="36" rx="10" fill="#111114" stroke="#6D4AFF" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="66" cy="624" r="4" fill="#22C55E"/>
  <text x="76" y="628" font-family="sans-serif" font-size="9" fill="#9898A6">Canton: invoice not double-financed · fraud registry clear</text>

  <!-- Bottom indicator -->
  <rect x="150" y="652" width="100" height="4" rx="2" fill="white" fill-opacity="0.3"/>
</svg>
