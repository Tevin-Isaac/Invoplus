<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" style="background:transparent">
  <defs>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1730"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </linearGradient>
    <linearGradient id="violetBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D4AFF"/>
      <stop offset="100%" stop-color="#8B6AFF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6D4AFF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Phone frame -->
  <rect x="30" y="10" width="340" height="680" rx="40" fill="#1A1A1F" filter="url(#shadow)"/>
  <rect x="36" y="16" width="328" height="668" rx="36" fill="url(#phoneBg)"/>

  <!-- Notch -->
  <rect x="140" y="22" width="120" height="28" rx="14" fill="#111114"/>

  <!-- Status bar -->
  <text x="60" y="42" font-family="sans-serif" font-size="11" fill="white" font-weight="600">9:41</text>
  <rect x="310" y="33" width="28" height="13" rx="3" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="312" y="35" width="20" height="9" rx="2" fill="#22C55E"/>
  <rect x="338" y="37" width="3" height="5" rx="1" fill="white" fill-opacity="0.6"/>

  <!-- App header -->
  <text x="60" y="80" font-family="sans-serif" font-size="18" font-weight="700" fill="white">Upload Invoice</text>
  <text x="60" y="98" font-family="sans-serif" font-size="11" fill="#9898A6">Drag or tap to upload your invoice</text>

  <!-- Upload zone -->
  <rect x="46" y="114" width="308" height="160" rx="16" fill="#16161A" stroke="#6D4AFF" stroke-width="1.5" stroke-dasharray="8 4"/>
  <!-- Upload icon -->
  <circle cx="200" cy="168" r="28" fill="#6D4AFF" fill-opacity="0.15"/>
  <text x="200" y="176" font-family="sans-serif" font-size="26" text-anchor="middle">📄</text>
  <text x="200" y="210" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Tap to Upload PDF</text>
  <text x="200" y="226" font-family="sans-serif" font-size="10" fill="#9898A6" text-anchor="middle">Max 10MB · PDF, PNG, JPG</text>
  <text x="200" y="264" font-family="sans-serif" font-size="10" fill="#6D4AFF" text-anchor="middle">AI verification in &lt;30 seconds</text>

  <!-- Form fields -->
  <text x="60" y="300" font-family="sans-serif" font-size="11" fill="#9898A6">Invoice Number</text>
  <rect x="46" y="308" width="308" height="40" rx="10" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="64" y="333" font-family="sans-serif" font-size="12" fill="white">INV-2026-0043</text>

  <text x="60" y="368" font-family="sans-serif" font-size="11" fill="#9898A6">Debtor Company</text>
  <rect x="46" y="376" width="308" height="40" rx="10" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="64" y="401" font-family="sans-serif" font-size="12" fill="white">GlobalTech Solutions Ltd</text>

  <text x="60" y="436" font-family="sans-serif" font-size="11" fill="#9898A6">Invoice Amount</text>
  <rect x="46" y="444" width="148" height="40" rx="10" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="64" y="469" font-family="sans-serif" font-size="12" fill="white">$125,000</text>
  <rect x="206" y="444" width="148" height="40" rx="10" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="224" y="469" font-family="sans-serif" font-size="12" fill="white">Due: Sep 23</text>

  <!-- AI score preview -->
  <rect x="46" y="500" width="308" height="64" rx="12" fill="#1A1730" stroke="#6D4AFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="66" y="524" font-family="sans-serif" font-size="11" fill="#9898A6">Estimated AI Score</text>
  <text x="66" y="546" font-family="sans-serif" font-size="22" font-weight="700" fill="#6D4AFF">~85 / 100</text>
  <text x="290" y="524" font-family="sans-serif" font-size="10" fill="#9898A6" text-anchor="end">Grade</text>
  <rect x="270" y="530" width="36" height="22" rx="6" fill="#22C55E" fill-opacity="0.2"/>
  <text x="288" y="546" font-family="sans-serif" font-size="13" fill="#22C55E" text-anchor="middle" font-weight="700">A</text>

  <!-- Submit button -->
  <rect x="46" y="582" width="308" height="48" rx="14" fill="url(#violetBtn)"/>
  <text x="200" y="611" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Submit for Verification →</text>

  <!-- Bottom indicator -->
  <rect x="150" y="652" width="100" height="4" rx="2" fill="white" fill-opacity="0.3"/>
</svg>
