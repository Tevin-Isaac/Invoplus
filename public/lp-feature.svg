<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 813 864" style="background:#0D0D0F">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D0F"/>
      <stop offset="100%" stop-color="#1A1730"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#252530"/>
    </pattern>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6D4AFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6D4AFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="813" height="864" fill="url(#bg3)"/>
  <rect width="813" height="864" fill="url(#dots)"/>
  <circle cx="406" cy="432" r="340" fill="url(#glowCenter)"/>

  <!-- Central title -->
  <text x="406" y="80" font-family="sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">How Sealed-Bid Privacy Works</text>
  <text x="406" y="104" font-family="sans-serif" font-size="13" fill="#9898A6" text-anchor="middle">Canton's sub-transaction privacy makes this possible</text>

  <!-- Center node: Invoice -->
  <circle cx="406" cy="380" r="64" fill="#1A1730" stroke="#6D4AFF" stroke-width="2"/>
  <text x="406" y="372" font-family="sans-serif" font-size="30" text-anchor="middle">📄</text>
  <text x="406" y="394" font-family="sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">INVOICE</text>
  <text x="406" y="408" font-family="sans-serif" font-size="9" fill="#6D4AFF" text-anchor="middle">$125,000 · Grade A</text>

  <!-- Seller node (left) -->
  <line x1="200" y1="380" x2="342" y2="380" stroke="#6D4AFF" stroke-width="1.5" stroke-dasharray="6 3"/>
  <circle cx="150" cy="380" r="48" fill="#1A1730" stroke="#22C55E" stroke-width="2"/>
  <text x="150" y="372" font-family="sans-serif" font-size="24" text-anchor="middle">🏢</text>
  <text x="150" y="392" font-family="sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">SELLER</text>
  <text x="150" y="406" font-family="sans-serif" font-size="9" fill="#22C55E" text-anchor="middle">Acme Corp</text>

  <!-- Platform node (top) -->
  <line x1="406" y1="200" x2="406" y2="316" stroke="#6D4AFF" stroke-width="1.5" stroke-dasharray="6 3"/>
  <circle cx="406" cy="152" r="48" fill="#1A1730" stroke="#F59E0B" stroke-width="2"/>
  <text x="406" y="144" font-family="sans-serif" font-size="24" text-anchor="middle">🤖</text>
  <text x="406" y="164" font-family="sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">AI ENGINE</text>
  <text x="406" y="178" font-family="sans-serif" font-size="9" fill="#F59E0B" text-anchor="middle">Verifies &amp; scores</text>

  <!-- Financier 1 node (right top) -->
  <line x1="664" y1="260" x2="468" y2="344" stroke="#9898A6" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="698" cy="240" r="44" fill="#111114" stroke="#9898A6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="698" y="232" font-family="sans-serif" font-size="22" text-anchor="middle">🏦</text>
  <text x="698" y="250" font-family="sans-serif" font-size="10" font-weight="700" fill="#9898A6" text-anchor="middle">FINANCIER A</text>
  <text x="698" y="264" font-family="sans-serif" font-size="9" fill="#9898A6" text-anchor="middle">🔒 Sealed bid</text>

  <!-- Financier 2 node (right) -->
  <line x1="670" y1="380" x2="470" y2="380" stroke="#9898A6" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="712" cy="380" r="44" fill="#111114" stroke="#9898A6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="712" y="372" font-family="sans-serif" font-size="22" text-anchor="middle">🏦</text>
  <text x="712" y="390" font-family="sans-serif" font-size="10" font-weight="700" fill="#9898A6" text-anchor="middle">FINANCIER B</text>
  <text x="712" y="404" font-family="sans-serif" font-size="9" fill="#9898A6" text-anchor="middle">🔒 Sealed bid</text>

  <!-- Financier 3 node (right bottom) -->
  <line x1="664" y1="500" x2="468" y2="416" stroke="#9898A6" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="698" cy="520" r="44" fill="#111114" stroke="#9898A6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="698" y="512" font-family="sans-serif" font-size="22" text-anchor="middle">🏦</text>
  <text x="698" y="530" font-family="sans-serif" font-size="10" font-weight="700" fill="#9898A6" text-anchor="middle">FINANCIER C</text>
  <text x="698" y="544" font-family="sans-serif" font-size="9" fill="#9898A6" text-anchor="middle">🔒 Sealed bid</text>

  <!-- Privacy indicator labels -->
  <rect x="480" y="296" width="120" height="28" rx="8" fill="#111114" stroke="#9898A6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="540" y="314" font-family="sans-serif" font-size="10" fill="#9898A6" text-anchor="middle">bids are sealed</text>

  <rect x="480" y="356" width="120" height="28" rx="8" fill="#111114" stroke="#9898A6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="540" y="374" font-family="sans-serif" font-size="10" fill="#9898A6" text-anchor="middle">bids are sealed</text>

  <rect x="480" y="416" width="120" height="28" rx="8" fill="#111114" stroke="#9898A6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="540" y="434" font-family="sans-serif" font-size="10" fill="#9898A6" text-anchor="middle">bids are sealed</text>

  <!-- Winner revealed -->
  <rect x="60" y="480" width="260" height="72" rx="14" fill="#1A2E1A" stroke="#22C55E" stroke-width="1.5"/>
  <text x="80" y="504" font-family="sans-serif" font-size="11" font-weight="700" fill="#22C55E">Auction Settled!</text>
  <text x="80" y="520" font-family="sans-serif" font-size="10" fill="white">Financier B wins · 88% advance rate</text>
  <text x="80" y="536" font-family="sans-serif" font-size="10" fill="#9898A6">$110,000 disbursed in 3.2 seconds</text>
  <text x="80" y="552" font-family="sans-serif" font-size="9" fill="#22C55E">Canton atomic settlement on-chain ✓</text>
  <line x1="200" y1="480" x2="360" y2="416" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Privacy note -->
  <rect x="60" y="580" width="680" height="64" rx="14" fill="#16161A" stroke="#6D4AFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="400" y="604" font-family="sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">Canton's Privacy Guarantee</text>
  <text x="400" y="624" font-family="sans-serif" font-size="11" fill="#9898A6" text-anchor="middle">Each SealedBid contract is visible only to the bidder and platform — not to</text>
  <text x="400" y="638" font-family="sans-serif" font-size="11" fill="#9898A6" text-anchor="middle">the seller or other financiers. This is enforced cryptographically by Canton's ledger.</text>

  <!-- Stats row -->
  <rect x="60" y="676" width="200" height="80" rx="12" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="160" y="708" font-family="sans-serif" font-size="11" fill="#9898A6" text-anchor="middle">Avg Bids per Auction</text>
  <text x="160" y="736" font-family="sans-serif" font-size="28" font-weight="700" fill="#6D4AFF" text-anchor="middle">6.4</text>

  <rect x="300" y="676" width="200" height="80" rx="12" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="400" y="708" font-family="sans-serif" font-size="11" fill="#9898A6" text-anchor="middle">Better Rate vs. Traditional</text>
  <text x="400" y="736" font-family="sans-serif" font-size="28" font-weight="700" fill="#22C55E" text-anchor="middle">+3.2%</text>

  <rect x="540" y="676" width="200" height="80" rx="12" fill="#16161A" stroke="#252530" stroke-width="1"/>
  <text x="640" y="708" font-family="sans-serif" font-size="11" fill="#9898A6" text-anchor="middle">Settlement Time</text>
  <text x="640" y="736" font-family="sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle">3.2s</text>
</svg>
